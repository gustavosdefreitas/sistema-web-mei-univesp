{% extends "base.html" %}
{% block content %}
<div class="container">
  <h3>Editar Produto</h3>
  <form action="/produtos/editar/{{ produto.id }}" method="POST">
    <input type="text" name="nome" class="form-control mb-2" value="{{ produto.nome }}">
    <input type="number" name="quantidade" class="form-control mb-2" value="{{ produto.quantidade }}">
    <input type="number" step="0.01" name="preco" class="form-control mb-2" value="{{ produto.preco }}">
    
    <label>Empresa Vinculada</label>
    <select name="empresa_id" class="form-select">
        {% for e in empresas %}
        <option value="{{ e.id }}" {% if e.id == produto.empresa_id %}selected{% endif %}>
            {{ e.nome_fantasia }}
        </option>
        {% endfor %}
    </select>

    <label class="form-label mt-2">Fornecedor</label>
    <select name="fornecedor_id" class="form-select">
        {% for f in fornecedores %}
        <option value="{{ f.id }}" {% if f.id == produto.fornecedor_id %}selected{% endif %}>
          {{ f.nome }}
        </option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-success">Salvar</button>
  </form>
</div>
{% endblock %}
