<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Estoque MEI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .nav-link:hover { color: #ffc107 !important; }
        body { background-color: #f4f7f6; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-box-open me-2"></i>ESTOQUE PRO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/produtos"><i class="fas fa-tags me-1"></i> Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/vendas"><i class="fas fa-shopping-cart me-1"></i> Vendas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/fornecedores"><i class="fas fa-truck me-1"></i> Fornecedores</a>
                    </li>
                    {% if user and user.perfil == 'admin' %}
                    <li class="nav-item border-start ms-lg-2 ps-lg-2">
                        <a class="nav-link text-warning" href="/usuarios"><i class="fas fa-users-cog me-1"></i> Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info" href="/empresas"><i class="fas fa-city me-1"></i> Empresas</a>
                    </li>
                    {% endif %}
                </ul>
                <div class="navbar-nav">
                    <span class="nav-link text-white d-none d-lg-block">
                        <i class="fas fa-user-circle me-1"></i> {{ user.username }}
                    </span>
                    <a class="nav-link btn btn-outline-light btn-sm ms-lg-3 px-3" href="/logout">Sair</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
