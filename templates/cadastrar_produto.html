{% extends "base.html" %}

{% block title %}Novo Produto - Estoque MEI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">
                    <i class="fas fa-plus-circle me-2"></i>Cadastrar Produto
                </h5>
            </div>
            <div class="card-body p-4">
                <form action="/produtos/novo" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: Arroz 5kg" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Quantidade</label>
                            <input type="number" name="quantidade" class="form-control" step="0.01" min="0" placeholder="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Preço (R$)</label>
                            <input type="number" name="preco" class="form-control" step="0.01" min="0" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Empresa</label>
                        <select name="empresa_id" class="form-select" required>
                            <option value="" disabled selected>Selecione a empresa...</option>
                            {% for e in empresas %}
                            <option value="{{ e.id }}">{{ e.nome_fantasia }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Fornecedor</label>
                        <select name="fornecedor_id" class="form-select" required>
                            <option value="" disabled selected>Selecione o fornecedor...</option>
                            {% for f in fornecedores %}
                            <option value="{{ f.id }}">{{ f.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="/produtos" class="btn btn-secondary w-50">
                            <i class="fas fa-arrow-left me-1"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary w-50 fw-bold">
                            <i class="fas fa-save me-1"></i> Salvar Produto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
